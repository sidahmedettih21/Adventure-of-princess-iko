<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ikram's Purple Eternal Realm 💜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Quicksand:wght@400;600;700&family=Caveat:wght@600&display=swap');

        :root {
            --dark-purple: #1a0024;
            --neon-purple: #C026D3;
            --soft-purple: #E0BBFF;
            --deep-purple: #6B00B0;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--dark-purple);
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        #gameCanvas { display: block; width: 100%; height: 100%; }

        .crt::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            z-index: 5; background-size: 100% 3px;
            pointer-events: none; opacity: 0.3;
        }

        .font-gamer { font-family: 'VT323', monospace; }
        .font-whisper { font-family: 'Caveat', cursive; }

        .glass-panel {
            background: rgba(26, 0, 36, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(192, 38, 211, 0.5);
            box-shadow: 0 0 25px rgba(107, 0, 176, 0.7), inset 0 0 15px rgba(192, 38, 211, 0.3);
        }

        .neon-text { text-shadow: 0 0 5px var(--soft-purple), 0 0 15px var(--neon-purple), 0 0 30px var(--neon-purple); }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        .interactive { pointer-events: auto; }

        #joystick-zone {
            position: absolute; bottom: 30px; left: 30px;
            width: 140px; height: 140px;
            background: rgba(224, 187, 255, 0.05);
            border-radius: 50%; border: 2px dashed rgba(192, 38, 211, 0.4);
            display: flex; justify-content: center; align-items: center; opacity: 0.8;
        }
        #joystick-knob {
            width: 50px; height: 50px;
            background: radial-gradient(circle, var(--soft-purple), var(--neon-purple));
            border-radius: 50%; box-shadow: 0 0 15px var(--neon-purple);
            position: absolute; transition: transform 0.05s;
        }

        #shoot-btn {
            position: absolute; bottom: 40px; right: 40px;
            width: 90px; height: 90px;
            background: radial-gradient(circle, #ffb3c6, #C026D3);
            border-radius: 50%; display: none;
            justify-content: center; align-items: center;
            font-size: 40px; box-shadow: 0 0 30px var(--neon-purple);
            border: 3px solid white; transition: transform 0.1s;
        }

        @media (min-width: 1024px) { #joystick-zone { display: none; } #desktop-hints { display: block !important; } }

        @keyframes pulseGlow { 0% { box-shadow: 0 0 20px var(--neon-purple); } 100% { box-shadow: 0 0 50px var(--soft-purple), 0 0 80px var(--neon-purple); } }
        .animate-pulse-glow { animation: pulseGlow 1.5s infinite alternate; }
        
        @keyframes floatUpConfetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }
        
        .hide { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .damage-flash { animation: damage 0.3s; }
        @keyframes damage { 0% { background-color: rgba(255,0,0,0.5); } 100% { background-color: transparent; } }
    </style>
</head>
<body class="crt">

    <div id="damage-overlay" class="absolute inset-0 z-10 pointer-events-none"></div>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="absolute top-4 left-4 interactive flex flex-col gap-2">
            <div class="glass-panel text-pink-300 px-4 py-2 rounded-xl font-gamer text-2xl tracking-wide flex items-center justify-between min-w-[160px]">
                <span>Memories:</span> <span id="ui-score" class="text-white">0/7</span>
            </div>
            <div class="glass-panel text-[#d4a373] px-4 py-2 rounded-xl font-gamer text-2xl tracking-wide flex items-center justify-between min-w-[160px]">
                <span>Chocolates:</span> <span id="ui-choc" class="text-white">0/12</span>
            </div>
        </div>

        <div class="absolute top-4 right-4 interactive">
            <button onclick="toggleAudio()" id="audio-btn" class="glass-panel text-purple-200 px-4 py-3 rounded-full font-gamer text-xl hover:bg-purple-900 transition">🎵 BGM: OFF</button>
        </div>

        <div id="desktop-hints" class="hidden absolute bottom-6 left-1/2 transform -translate-x-1/2 glass-panel px-6 py-3 rounded-full text-purple-300 font-gamer text-2xl tracking-wide">
            WASD to Move | SPACE to Shoot 💜
        </div>

        <div class="absolute top-24 right-6 interactive">
            <div id="papa-btn" class="w-14 h-14 glass-panel rounded-full flex items-center justify-center text-2xl cursor-pointer animate-pulse-glow" onclick="tapPapa()">🕴️</div>
        </div>

        <div id="joystick-zone" class="interactive"><div id="joystick-knob"></div></div>
        <div id="shoot-btn" class="interactive" onpointerdown="playerShoot()">🪄</div>

        <div id="toast" class="absolute top-24 left-1/2 transform -translate-x-1/2 glass-panel text-pink-200 px-8 py-3 rounded-full font-gamer text-2xl opacity-0 transition-opacity duration-300 tracking-wider text-center">Message</div>
    </div>

    <div id="memory-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md hide interactive">
        <div class="glass-panel max-w-lg w-full p-8 rounded-3xl text-center relative border-t-4 border-pink-500 fade-in">
            <div id="modal-icon" class="text-6xl mb-4 animate-bounce">💧</div>
            <h2 id="modal-title" class="font-gamer text-4xl text-pink-300 mb-4 neon-text tracking-wide uppercase">Title</h2>
            <p id="modal-text" class="text-xl text-purple-100 leading-relaxed mb-6 font-semibold"></p>
            <p id="modal-whisper" class="font-whisper text-3xl text-pink-400 mb-8"></p>
            <button onclick="closeModal()" class="px-8 py-4 rounded-full border-2 border-pink-500 bg-pink-900/50 text-pink-100 font-gamer text-3xl animate-pulse-glow w-full">Keep in my Heart (Ul-iw) 💜</button>
        </div>
    </div>

    <div id="final-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-4 text-center bg-[#0a0010] hide interactive">
        <div id="confetti-container" class="absolute inset-0 overflow-hidden pointer-events-none"></div>
        <div class="glass-panel p-8 rounded-3xl border-4 border-pink-500 shadow-[0_0_100px_#C026D3] max-w-2xl w-full flex flex-col items-center relative z-10 fade-in">
            <h1 class="font-gamer text-4xl md:text-6xl neon-text text-pink-300 mb-6 uppercase tracking-widest">Kabyle Forever Realm</h1>
            <p class="text-xl md:text-2xl text-purple-200 mb-6 font-bold">The Memoire Master is defeated.<br>Restarting our safe space... (Ul-iw)</p>
            <button onclick="restartGame()" class="px-10 py-4 rounded-full border-2 border-pink-400 text-pink-200 hover:bg-pink-900 transition font-gamer text-3xl animate-pulse-glow">
                Rest in Our Safe Space (Play Again)
            </button>
        </div>
    </div>

    <audio id="bgm" loop><source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3" type="audio/mpeg"></audio>

    <script>
        const MAP_SIZE = 3000;
        const MEMORIES = [
            { id: 1, x: 800, y: 800, color: '#4facfe', icon: '💧', title: 'Rain Garden', text: 'You walked 30 minutes in the rain just so I wouldn’t be disappointed… carrying that tiramisu like it was the most important thing in the world. (Axxam-iw)', whisper: 'My quiet Kabyle princess... you are my spark in the darkness 💜' },
            { id: 2, x: 2200, y: 800, color: '#d4a373', icon: '🍫', title: 'Chocolate Grove', text: 'Every time I see chocolate I remember how your eyes light up. You deserve the sweetest things in life.', whisper: 'You melt me faster than any chocolate ever could, my baby.' },
            { id: 3, x: 800, y: 2200, color: '#faedcd', icon: '🍰', title: 'Basbosa Kitchen', text: 'Your mom making basbosa and saying "send it to Sidahmed"… that was the day your whole family quietly chose me too.', whisper: 'You feed my heart even when we’re apart. (Tayri-w)' },
            { id: 4, x: 2200, y: 2200, color: '#e0bbff', icon: '✨', title: '5AM Star Sky', text: 'Your sleepy baby-voice humming at 5 a.m. while your brother was home… that sound lives inside my chest now.', whisper: 'You only let your softest self out for me…' },
            { id: 5, x: 1500, y: 500, color: '#ffb3c6', icon: '🛡️', title: 'Only Young Man Shield', text: 'All those older rich guys… and you still picked the 21-year-old who codes websites just to see you smile.', whisper: 'You chose the real man… and I will prove I was worth it.' },
            { id: 6, x: 1500, y: 2500, color: '#ff595e', icon: '🏎️', title: 'Future Porsche Path', text: 'One day I’ll pull up in that Porsche and you’ll never have to work again. Our home, built from scratch.', whisper: 'You’re my forever co-pilot.' },
            // FIX: moved snail memory slightly away from player spawn (was 1500,1500) so it doesn't trigger automatically
            { id: 7, x: 1520, y: 1480, color: '#8ac926', icon: '🐌', title: 'Snail Secret', text: 'Remember the silly snail picture? "look how slimy it is… I’m even slimier 😂"', whisper: 'Even the weirdest moments with you feel like magic. (Ul-iw)' }
        ];

        let canvas, ctx, width, height, lastTime = performance.now();
        let isModalOpen = false, audioPlaying = false, papaTaps = 0, finalTriggered = false;
        let unlockedMemories = [], chocolatesCollected = 0, hasWand = false, bossDefeated = false;

        const player = { x: 1500, y: 1500, size: 40, speed: 300, emoji: '👸🏻', faceX: 0, faceY: 1, cooldown: 0 };
        const camera = { x: 0, y: 0 };
        const chocolates = [], backgroundStars = [], particles = [], projectiles = [];
        const boss = { active: false, x: 0, y: 0, size: 80, emoji: '🎓', hp: 10, maxHp: 10, speed: 180, hitTimer: 0 };
        const keys = { w: false, a: false, s: false, d: false, ' ': false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        const joystick = { active: false, dx: 0, dy: 0 };

        window.onload = () => {
            canvas = document.getElementById('gameCanvas'); ctx = canvas.getContext('2d', { alpha: false });
            resize(); window.addEventListener('resize', resize);
            for(let i=0; i<400; i++) backgroundStars.push({ x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE, size: Math.random()*2+0.5, alpha: Math.random()*0.6+0.1 });
            for(let i=0; i<12; i++) chocolates.push({ x: 200 + Math.random()*(MAP_SIZE-400), y: 200 + Math.random()*(MAP_SIZE-400), collected: false });
            setupInputs();
            requestAnimationFrame(gameLoop);
            showToast("Welcome home, my baby 💜");
        };

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }

        function setupInputs() {
            window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; if(e.key === ' ' && hasWand) playerShoot(); });
            window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });
            const zone = document.getElementById('joystick-zone');
            const knob = document.getElementById('joystick-knob');
            let rect, centerX, centerY;
            const updateC = () => { rect = zone.getBoundingClientRect(); centerX = rect.left + rect.width / 2; centerY = rect.top + rect.height / 2; };
            updateC(); window.addEventListener('resize', updateC);
            const move = (e) => {
                e.preventDefault(); joystick.active = true; const t = e.targetTouches[0];
                let dx = t.clientX - centerX, dy = t.clientY - centerY;
                const dist = Math.hypot(dx, dy), max = rect.width / 2;
                if (dist > max) { dx = (dx/dist)*max; dy = (dy/dist)*max; }
                knob.style.transform = `translate(${dx}px, ${dy}px)`;
                joystick.dx = dx/max; joystick.dy = dy/max;
            };
            zone.addEventListener('touchstart', move, {passive: false}); zone.addEventListener('touchmove', move, {passive: false});
            zone.addEventListener('touchend', () => { joystick.active = false; knob.style.transform = `translate(0,0)`; });
        }

        function gameLoop(timestamp) {
            let dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            if (!isModalOpen) update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            let dx = 0, dy = 0;
            if (keys.w || keys.ArrowUp) dy -= 1; if (keys.s || keys.ArrowDown) dy += 1;
            if (keys.a || keys.ArrowLeft) dx -= 1; if (keys.d || keys.ArrowRight) dx += 1;
            if (joystick.active) { dx = joystick.dx; dy = joystick.dy; }
            if (dx !== 0 || dy !== 0) { const len = Math.hypot(dx, dy); dx /= len; dy /= len; player.faceX = dx; player.faceY = dy; }
            player.x += dx * player.speed * dt; player.y += dy * player.speed * dt;
            player.x = Math.max(40, Math.min(MAP_SIZE - 40, player.x)); player.y = Math.max(40, Math.min(MAP_SIZE - 40, player.y));
            camera.x = player.x - width / 2; camera.y = player.y - height / 2;
            if (player.cooldown > 0) player.cooldown -= dt;

            if (player.cooldown <= 0) {
                MEMORIES.forEach(m => {
                    if (!unlockedMemories.includes(m.id) && Math.hypot(player.x - m.x, player.y - m.y) < 140) triggerMemory(m);
                });
            }

            chocolates.forEach(ch => {
                if (!ch.collected && Math.hypot(player.x - ch.x, player.y - ch.y) < 50) {
                    ch.collected = true; chocolatesCollected++;
                    if (chocolatesCollected === 12) { hasWand = true; document.getElementById('shoot-btn').style.display = 'flex'; spawnBoss(); }
                    else showToast("+ Sweetness 🍫");
                    updateUI();
                }
            });

            if (boss.active) {
                if (boss.hitTimer > 0) boss.hitTimer -= dt;
                let bx = player.x - boss.x, by = player.y - boss.y, bl = Math.hypot(bx, by);
                if (bl > 0) { boss.x += (bx/bl)*boss.speed*dt; boss.y += (by/bl)*boss.speed*dt; }
                if (bl < 60) {
                    player.x -= (bx/bl)*150; player.y -= (by/bl)*150;
                    document.getElementById('damage-overlay').classList.add('damage-flash');
                    setTimeout(() => document.getElementById('damage-overlay').classList.remove('damage-flash'), 300);
                }
                projectiles.forEach((p, i) => {
                    if (Math.hypot(p.x - boss.x, p.y - boss.y) < 70) {
                        boss.hp--; boss.hitTimer = 0.2; projectiles.splice(i, 1);
                        if (boss.hp <= 0) { boss.active = false; bossDefeated = true; checkWin(); }
                    }
                });
            }

            projectiles.forEach((p, i) => { p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt; if(p.life <= 0) projectiles.splice(i, 1); });
            particles.forEach((p, i) => { p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt; if(p.life <= 0) particles.splice(i, 1); });
        }

        function draw() {
            ctx.fillStyle = '#1a0024'; ctx.fillRect(0,0,width,height);
            ctx.save(); ctx.translate(-camera.x, -camera.y);
            backgroundStars.forEach(s => {
                let px = (s.x + camera.x*0.1)%MAP_SIZE; if(px<0) px+=MAP_SIZE;
                let py = (s.y + camera.y*0.1)%MAP_SIZE; if(py<0) py+=MAP_SIZE;
                ctx.globalAlpha = s.alpha; ctx.fillStyle = '#E0BBFF'; ctx.beginPath(); ctx.arc(px,py,s.size,0,Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'lighter';
            MEMORIES.forEach(m => {
                const un = unlockedMemories.includes(m.id);
                const g = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, un ? 200 : 400);
                g.addColorStop(0, m.color + (un ? '11' : '33')); g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(m.x, m.y, 400, 0, Math.PI*2); ctx.fill();
                if (!un) {
                    ctx.fillStyle = m.color; ctx.beginPath(); ctx.arc(m.x, m.y, 25 + Math.sin(Date.now()/250)*5, 0, Math.PI*2); ctx.fill();
                }
            });
            ctx.globalCompositeOperation = 'source-over';
            
            // FIX: ensure chocolates are visible (light fillStyle)
            ctx.fillStyle = '#ffffff'; 
            ctx.font = "24px Arial"; 
            chocolates.forEach(ch => { if(!ch.collected) ctx.fillText('🍫', ch.x, ch.y); });
            
            // FIX: projectiles visible
            ctx.fillStyle = '#ffffff';
            projectiles.forEach(p => ctx.fillText('✨', p.x, p.y));
            
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life/p.maxLife; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            if (boss.active) {
                ctx.globalAlpha = boss.hitTimer > 0 ? 0.5 : 1;
                ctx.font = "80px Arial"; ctx.fillText(boss.emoji, boss.x, boss.y);
                ctx.fillStyle = 'red'; ctx.fillRect(boss.x-40, boss.y-60, 80, 8);
                ctx.fillStyle = '#00ff00'; ctx.fillRect(boss.x-40, boss.y-60, (boss.hp/boss.maxHp)*80, 8);
            }
            // FIX: player princess visible — set fillStyle to bright white and ensure alpha
            ctx.globalAlpha = 1; 
            ctx.fillStyle = '#ffffff'; 
            ctx.font = "55px Arial"; 
            ctx.fillText(player.emoji, player.x, player.y + Math.sin(Date.now()/200)*4);
            ctx.restore();

            MEMORIES.forEach(m => {
                if (!unlockedMemories.includes(m.id)) {
                    if (m.x < camera.x || m.x > camera.x + width || m.y < camera.y || m.y > camera.y + height) {
                        let a = Math.atan2(m.y-player.y, m.x-player.x);
                        ctx.save(); ctx.translate(Math.max(40, Math.min(width-40, width/2 + Math.cos(a)*(width/2-40))), Math.max(40, Math.min(height-40, height/2 + Math.sin(a)*(height/2-40))));
                        ctx.rotate(a); ctx.fillStyle = m.color + 'aa'; ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(-10,10); ctx.lineTo(-10,-10); ctx.fill(); ctx.restore();
                    }
                }
            });
        }

        function triggerMemory(m) {
            isModalOpen = true; unlockedMemories.push(m.id); updateUI();
            document.getElementById('modal-icon').innerText = m.icon;
            document.getElementById('modal-title').innerText = m.title; document.getElementById('modal-title').style.color = m.color;
            document.getElementById('modal-text').innerText = m.text; document.getElementById('modal-whisper').innerText = m.whisper;
            document.getElementById('memory-modal').classList.remove('hide');
        }

        function closeModal() { document.getElementById('memory-modal').classList.add('hide'); player.cooldown = 1.5; lastTime = performance.now(); isModalOpen = false; checkWin(); }

        function checkWin() { if (unlockedMemories.length === 7 && bossDefeated && !finalTriggered) { finalTriggered = true; isModalOpen = true; document.getElementById('final-screen').classList.remove('hide'); generateConfetti(); } }

        function restartGame() { window.location.reload(); }

        function playerShoot() { if(!hasWand) return; projectiles.push({ x: player.x, y: player.y, vx: player.faceX*600, vy: player.faceY*600, life: 1.5 }); }

        function spawnBoss() { boss.active = true; boss.hp = 10; boss.x = player.x + 800; boss.y = player.y; showToast("The Memoire Master Approaches! 🎓"); }

        function updateUI() { document.getElementById('ui-score').innerText = `${unlockedMemories.length}/7`; document.getElementById('ui-choc').innerText = `${chocolatesCollected}/12`; }

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }

        function toggleAudio() { const b = document.getElementById('bgm'); audioPlaying ? b.pause() : b.play(); audioPlaying = !audioPlaying; document.getElementById('audio-btn').innerText = audioPlaying ? "🎵 BGM: ON" : "🎵 BGM: OFF"; }

        function generateConfetti() {
            const c = document.getElementById('confetti-container');
            for(let i=0; i<100; i++) {
                const d = document.createElement('div'); d.innerText = '💜'; d.style.position = 'absolute'; d.style.left = Math.random()*100+'vw'; d.style.top = '100vh';
                d.style.animation = `floatUpConfetti ${Math.random()*3+2}s linear infinite`; c.appendChild(d);
            }
        }

        function tapPapa() { papaTaps++; if(papaTaps >= 25) { showToast("Extra real-life cuddles unlocked! 💜"); papaTaps = 0; } }
    </script>
</body>
</html>
